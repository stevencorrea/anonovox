<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>anonovox — sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Prata:wght@400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./design-system.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .glow {
      position: fixed;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(44, 62, 122, 0.08) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    .back {
      position: fixed;
      top: 1.5rem;
      left: 2rem;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: color var(--transition-fast);
      z-index: 10;
      font-weight: 500;
    }

    .back:hover {
      color: var(--accent);
    }

    .back svg {
      transition: transform var(--transition-fast);
    }

    .back:hover svg {
      transform: translateX(-3px);
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border-light);
      padding: 3rem;
      border-radius: 1rem;
      box-shadow: var(--shadow-md);
      z-index: 2;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(to right, transparent, var(--accent) 40%, var(--accent) 60%, transparent);
      border-radius: 1rem 1rem 0 0;
    }

    .eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
      font-weight: 600;
    }

    h1 {
      font-family: var(--ff-display);
      font-size: 2rem;
      font-weight: 600;
      line-height: 1.2;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .field {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-primary);
      margin-bottom: 0.65rem;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 0.85rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: var(--ff-body);
      font-size: 0.95rem;
      font-weight: 400;
      outline: none;
      border-radius: 0.5rem;
      transition: border-color var(--transition-fast);
      -webkit-font-smoothing: antialiased;
    }

    input::placeholder {
      color: var(--text-tertiary);
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-pale);
    }

    .domain-hint {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: var(--text-tertiary);
      min-height: 1.25em;
    }

    .domain-hint span {
      color: var(--accent);
      font-weight: 500;
    }

    button[type="submit"] {
      margin-top: 0.5rem;
      width: 100%;
      padding: 0.85rem 1rem;
      background: var(--accent);
      color: #ffffff;
      border: none;
      font-family: var(--ff-body);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 0.5rem;
      transition: all var(--transition-fast);
      box-shadow: var(--shadow-md);
    }

    button[type="submit"]:hover:not(:disabled) {
      background: var(--accent-light);
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }

    button[type="submit"]:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: var(--shadow-sm);
    }

    button[type="submit"]:disabled {
      background: var(--accent-pale);
      color: var(--text-tertiary);
      cursor: not-allowed;
      box-shadow: var(--shadow-sm);
    }

    .toggle-row {
      margin-top: 1.75rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
      text-align: center;
    }

    .toggle-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-family: var(--ff-body);
      font-size: inherit;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      padding: 0;
      transition: color var(--transition-fast);
    }

    .toggle-btn:hover {
      color: var(--accent-light);
      text-decoration: underline;
    }

    .message {
      margin-top: 1.5rem;
      padding: 1rem;
      font-size: 0.9rem;
      line-height: 1.6;
      display: none;
      border: 1px solid;
      border-radius: 0.5rem;
    }

    .message.success {
      background: rgba(45, 80, 22, 0.08);
      color: var(--success);
      border-color: var(--success);
    }

    .message.error {
      background: rgba(196, 30, 58, 0.08);
      color: var(--error);
      border-color: var(--error);
    }

    @media (max-width: 600px) {
      body {
        padding: 1.5rem 1rem;
      }

      .card {
        padding: 2rem;
      }

      h1 {
        font-size: 1.6rem;
      }

      .back {
        font-size: 0.7rem;
        left: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <a href="/" class="back">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
    anonovox
  </a>

  <div class="card">
    <div class="eyebrow">Account</div>
    <h1 id="form-title">Welcome back.</h1>
    <p class="subtitle" id="form-subtitle">Sign in to submit and view feedback.</p>

    <form id="auth-form" autocomplete="on">
      <div class="field">
        <label for="email">Work email</label>
        <input type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="email" />
        <div class="domain-hint" id="domain-hint"></div>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" id="submit-btn">
        <span id="submit-label">Sign in</span>
      </button>
    </form>

    <div id="message" class="message"></div>

    <p class="toggle-row" id="toggle-text">
      No account? <button class="toggle-btn" id="toggle-btn">Create one.</button>
    </p>
  </div>

  <script src="./theme-toggle.js"></script>
  <script type="module" src="./signin.ts"></script>
</body>
</html>
