substitutions:
  _REGION: us-west1
  _SERVICE: anonovox
  _AR_REPO_BASE: us-west1-docker.pkg.dev/anonovox/anonovox
  _IMAGE_NAME: anonovox
  _RUNTIME_SERVICE_ACCOUNT: anonovox-runtime@anonovox.iam.gserviceaccount.com

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_AR_REPO_BASE}/${_IMAGE_NAME}:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_AR_REPO_BASE}/${_IMAGE_NAME}:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        IMAGE="${_AR_REPO_BASE}/${_IMAGE_NAME}:$COMMIT_SHA"

        gcloud run deploy "${_SERVICE}" \
          --image="${IMAGE}" \
          --region="${_REGION}" \
          --platform=managed \
          --allow-unauthenticated \
          --service-account="${_RUNTIME_SERVICE_ACCOUNT}" \
          --min-instances=1 \
          --max-instances=4 \
          --memory=512Mi \
          --cpu=1 \
          --update-env-vars="NODE_ENV=production" \
          --update-secrets="\
            DATABASE_URL=DATABASE_URL:latest,\
            BETTER_AUTH_SECRET=BETTER_AUTH_SECRET:latest,\
            BETTER_AUTH_URL=BETTER_AUTH_URL:latest,\
            ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,\
            RESEND_API_KEY=RESEND_API_KEY:latest,\
            EMAIL_FROM=EMAIL_FROM:latest,\
            MICROSOFT_CLIENT_ID=MICROSOFT_CLIENT_ID:latest,\
            MICROSOFT_CLIENT_SECRET=MICROSOFT_CLIENT_SECRET:latest,\
            MICROSOFT_TENANT_ID=MICROSOFT_TENANT_ID:latest,\
            ENTRA_ADMIN_ROLE_IDS=ENTRA_ADMIN_ROLE_IDS:latest,\
            SLACK_CLIENT_ID=SLACK_CLIENT_ID:latest,\
            SLACK_CLIENT_SECRET=SLACK_CLIENT_SECRET:latest,\
            SLACK_SIGNING_SECRET=SLACK_SIGNING_SECRET:latest,\
            TEAMS_APP_ID=TEAMS_APP_ID:latest,\
            TEAMS_APP_SECRET=TEAMS_APP_SECRET:latest,\
            SCHEDULER_SECRET=SCHEDULER_SECRET:latest"

images:
  - ${_AR_REPO_BASE}/${_IMAGE_NAME}:$COMMIT_SHA
