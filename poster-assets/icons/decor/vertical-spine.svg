<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 8 320" preserveAspectRatio="none" role="img" aria-label="Vertical accent spine">
  <!-- 2px gradient spine, matches .hero::before in index.html -->
  <defs>
    <linearGradient id="spine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="currentColor" stop-opacity="0"/>
      <stop offset="25%"  stop-color="currentColor" stop-opacity="0.6"/>
      <stop offset="75%"  stop-color="currentColor" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="currentColor" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="3" y="0" width="2" height="320" fill="url(#spine)"/>
</svg>
