<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="Verified seal badge">
  <!-- 12-point starburst seal -->
  <g>
    <circle cx="32" cy="32" r="22"/>
    <circle cx="32" cy="32" r="17" opacity="0.4"/>
    <!-- Burst points -->
    <g stroke-width="1">
      <line x1="32" y1="4"  x2="32" y2="10"/>
      <line x1="32" y1="54" x2="32" y2="60"/>
      <line x1="4"  y1="32" x2="10" y2="32"/>
      <line x1="54" y1="32" x2="60" y2="32"/>
      <line x1="12" y1="12" x2="16" y2="16"/>
      <line x1="48" y1="48" x2="52" y2="52"/>
      <line x1="52" y1="12" x2="48" y2="16"/>
      <line x1="16" y1="48" x2="12" y2="52"/>
      <line x1="32" y1="2"  x2="32" y2="2" opacity="0"/>
    </g>
  </g>
  <!-- Center glyph: V for Vox -->
  <path d="M24 24 L 32 40 L 40 24" stroke-width="1.75"/>
</svg>
