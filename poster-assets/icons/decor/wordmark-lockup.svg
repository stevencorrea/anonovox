<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" role="img" aria-label="anonovox wordmark">
  <!-- Wordmark — uses the same Prata serif as nav .wordmark. The bold half is in accent. -->
  <text x="0" y="44"
        font-family="Prata, 'Cormorant Garamond', serif"
        font-size="36"
        letter-spacing="3"
        fill="currentColor">anono<tspan font-weight="700" opacity="0.95">vox</tspan></text>
  <!-- Eyebrow tag -->
  <line x1="0" y1="56" x2="24" y2="56" stroke="currentColor" stroke-width="1"/>
  <text x="32" y="60"
        font-family="Inter, 'Instrument Sans', sans-serif"
        font-size="9"
        letter-spacing="2"
        fill="currentColor"
        opacity="0.7">CANDOR, DELIVERED</text>
</svg>
