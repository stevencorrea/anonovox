<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="OpenTelemetry observability">
  <!-- Concentric radar arcs from a corner -->
  <path d="M 8 56 A 12 12 0 0 1 20 44"/>
  <path d="M 8 56 A 24 24 0 0 1 32 32" opacity="0.7"/>
  <path d="M 8 56 A 36 36 0 0 1 44 20" opacity="0.45"/>
  <path d="M 8 56 A 48 48 0 0 1 56 8"  opacity="0.25"/>
  <!-- Origin pulse + sweep -->
  <circle cx="8" cy="56" r="2.5" fill="currentColor" stroke="none"/>
  <line x1="8" y1="56" x2="48" y2="16" opacity="0.6"/>
  <!-- Trace nodes along the sweep -->
  <circle cx="22" cy="42" r="1.8" fill="currentColor" stroke="none"/>
  <circle cx="34" cy="30" r="1.8" fill="currentColor" stroke="none"/>
  <circle cx="46" cy="18" r="1.8" fill="currentColor" stroke="none"/>
</svg>
