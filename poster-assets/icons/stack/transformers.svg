<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="Transformers.js neural network">
  <!-- Three layers, fully-connected -->
  <g opacity="0.55">
    <!-- input -> hidden -->
    <line x1="14" y1="16" x2="32" y2="22"/>
    <line x1="14" y1="16" x2="32" y2="32"/>
    <line x1="14" y1="16" x2="32" y2="42"/>
    <line x1="14" y1="32" x2="32" y2="22"/>
    <line x1="14" y1="32" x2="32" y2="32"/>
    <line x1="14" y1="32" x2="32" y2="42"/>
    <line x1="14" y1="48" x2="32" y2="22"/>
    <line x1="14" y1="48" x2="32" y2="32"/>
    <line x1="14" y1="48" x2="32" y2="42"/>
    <!-- hidden -> output -->
    <line x1="32" y1="22" x2="50" y2="24"/>
    <line x1="32" y1="22" x2="50" y2="40"/>
    <line x1="32" y1="32" x2="50" y2="24"/>
    <line x1="32" y1="32" x2="50" y2="40"/>
    <line x1="32" y1="42" x2="50" y2="24"/>
    <line x1="32" y1="42" x2="50" y2="40"/>
  </g>
  <!-- Nodes -->
  <g fill="currentColor" stroke="none">
    <circle cx="14" cy="16" r="2.5"/>
    <circle cx="14" cy="32" r="2.5"/>
    <circle cx="14" cy="48" r="2.5"/>
    <circle cx="32" cy="22" r="2.5"/>
    <circle cx="32" cy="32" r="2.5"/>
    <circle cx="32" cy="42" r="2.5"/>
    <circle cx="50" cy="24" r="2.5"/>
    <circle cx="50" cy="40" r="2.5"/>
  </g>
</svg>
