<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="Slack">
  <!-- Four rounded stadiums in pinwheel arrangement (Slack-gestalt without literal logo). -->
  <!-- Top horizontal -->
  <rect x="22" y="6"  width="22" height="8" rx="4"/>
  <!-- Right vertical -->
  <rect x="50" y="22" width="8"  height="22" rx="4"/>
  <!-- Bottom horizontal -->
  <rect x="20" y="50" width="22" height="8" rx="4"/>
  <!-- Left vertical -->
  <rect x="6"  y="20" width="8"  height="22" rx="4"/>
  <!-- Tiny center accent dots -->
  <circle cx="32" cy="32" r="1.4" fill="currentColor" stroke="none" opacity="0.5"/>
</svg>
