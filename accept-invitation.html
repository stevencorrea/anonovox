<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accept invitation — anonovox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Prata:wght@400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./design-system.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(44, 62, 122, 0.07) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border-light);
      padding: 3rem;
      border-radius: 1rem;
      box-shadow: var(--shadow-md);
      z-index: 2;
      text-align: center;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(to right, transparent, var(--accent) 40%, var(--accent) 60%, transparent);
      border-radius: 1rem 1rem 0 0;
    }

    .wordmark {
      display: block;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      text-decoration: none;
      margin-bottom: 2rem;
    }

    .wordmark b { color: var(--accent); }

    .icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    .icon-loading { background: var(--surface-alt); border: 1px solid var(--border-light); }
    .icon-success { background: rgba(45, 80, 22, 0.1); border: 1px solid rgba(45, 80, 22, 0.2); }
    .icon-error   { background: rgba(192, 57, 43, 0.08); border: 1px solid rgba(192, 57, 43, 0.18); }

    .spinner {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    h2 {
      font-family: var(--ff-display);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin: 0;
    }

    .actions {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .state { display: none; }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <div class="card">
    <a href="/" class="wordmark">anono<b>vox</b></a>

    <!-- Loading -->
    <div id="state-loading" class="state">
      <div class="icon icon-loading" style="display:flex">
        <div class="spinner"></div>
      </div>
      <h2>Checking…</h2>
      <p>Verifying your invitation.</p>
    </div>

    <!-- Accepting -->
    <div id="state-accepting" class="state">
      <div class="icon icon-loading" style="display:flex">
        <div class="spinner"></div>
      </div>
      <h2>Joining…</h2>
      <p>Accepting your invitation.</p>
    </div>

    <!-- Success -->
    <div id="state-success" class="state">
      <div class="icon icon-success" style="display:flex">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <polyline points="4,11 9,16 18,6" stroke="var(--success)" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2>You're in.</h2>
      <p id="success-msg">You've joined the organization. You can now submit and view feedback.</p>
      <div class="actions">
        <a href="/feedback" class="btn-primary">Submit feedback</a>
        <a href="/settings" class="btn-secondary">Go to settings</a>
      </div>
    </div>

    <!-- Error -->
    <div id="state-error" class="state">
      <div class="icon icon-error" style="display:flex">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <line x1="6" y1="6" x2="16" y2="16" stroke="#c0392b" stroke-width="2" stroke-linecap="round"/>
          <line x1="16" y1="6" x2="6" y2="16" stroke="#c0392b" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <h2>Couldn't accept</h2>
      <p id="error-msg">This invitation link is invalid or has expired.</p>
      <div class="actions">
        <a href="/signin" class="btn-secondary">Go to sign in</a>
      </div>
    </div>
  </div>

  <script src="./theme-toggle.js"></script>
  <script type="module" src="./accept-invitation.ts"></script>
</body>
</html>
