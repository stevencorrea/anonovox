name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  SERVICE: anonovox
  IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/anonovox/app

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # required for Workload Identity Federation

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image="${{ env.IMAGE }}:${{ github.sha }}" \
            --region="${{ env.REGION }}" \
            --platform=managed \
            --allow-unauthenticated \
            --service-account="${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}" \
            --add-cloudsql-instances="${{ vars.CLOUD_SQL_INSTANCE }}" \
            --min-instances=0 \
            --max-instances=10 \
            --memory=512Mi \
            --cpu=1 \
            --set-secrets="\
              DATABASE_URL=DATABASE_URL:latest,\
              BETTER_AUTH_SECRET=BETTER_AUTH_SECRET:latest,\
              BETTER_AUTH_URL=BETTER_AUTH_URL:latest,\
              BETTER_AUTH_API_KEY=BETTER_AUTH_API_KEY:latest,\
              ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,\
              RESEND_API_KEY=RESEND_API_KEY:latest,\
              EMAIL_FROM=EMAIL_FROM:latest,\
              MICROSOFT_CLIENT_ID=MICROSOFT_CLIENT_ID:latest,\
              MICROSOFT_CLIENT_SECRET=MICROSOFT_CLIENT_SECRET:latest,\
              MICROSOFT_TENANT_ID=MICROSOFT_TENANT_ID:latest,\
              ENTRA_ADMIN_ROLE_IDS=ENTRA_ADMIN_ROLE_IDS:latest,\
              SLACK_CLIENT_ID=SLACK_CLIENT_ID:latest,\
              SLACK_CLIENT_SECRET=SLACK_CLIENT_SECRET:latest,\
              SLACK_SIGNING_SECRET=SLACK_SIGNING_SECRET:latest,\
              SCHEDULER_SECRET=SCHEDULER_SECRET:latest"

      - name: Show service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region="${{ env.REGION }}" \
            --format="value(status.url)")
          echo "Deployed to: $URL" >> $GITHUB_STEP_SUMMARY
